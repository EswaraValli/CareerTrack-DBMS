{% extends "base.html" %}

{% block title %}Jobs - CareerTrack PMS{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2><i class="fas fa-briefcase"></i> Job Opportunities</h2>
        </div>
        <div class="col-md-4 text-end" id="adminActions" style="display: none;">
            <button class="btn btn-primary" onclick="showAddJobModal()">
                <i class="fas fa-plus"></i> Add New Job
            </button>
        </div>
    </div>
    
    <div class="row mb-3">
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search jobs...">
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterType">
                                <option value="">All Job Types</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Internship">Internship</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filterCompany">
                                <option value="">All Companies</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100" onclick="loadJobs()">
                                <i class="fas fa-filter"></i> Filter
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="jobsContainer" class="row">
        <div class="col-12 text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<!-- Job Details Modal -->
<div class="modal fade" id="jobModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="jobModalTitle">Job Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="jobModalBody">
                <!-- Job details will be loaded here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" id="applyBtn" onclick="applyForJob()">
                    <i class="fas fa-paper-plane"></i> Apply Now
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentUser = null;
let currentJobId = null;
let allJobs = [];

async function initPage() {
    currentUser = await checkAuth();
    
    if (!currentUser) {
        window.location.href = '/login';
        return;
    }
    
    // Show admin actions for authorized roles
    if (['Admin', 'PlacementOfficer'].includes(currentUser.role)) {
        document.getElementById('adminActions').style.display = 'block';
    }
    
    await loadJobs();
    await loadCompaniesFilter();
}

async function loadJobs() {
    try {
        const endpoint = currentUser.role === 'Student' ? '/jobs/eligible' : '/jobs/';
        const response = await apiCall(endpoint);
        
        if (!response.ok) throw new Error('Failed to load jobs');
        
        allJobs = await response.json();
        displayJobs(allJobs);
    } catch (error) {
        console.error('Error loading jobs:', error);
        document.getElementById('jobsContainer').innerHTML = `
            <div class="col-12">
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle"></i> Error loading jobs: ${error.message}
                </div>
            </div>
        `;
    }
}

function displayJobs(jobs) {
    const container = document.getElementById('jobsContainer');
    
    if (jobs.length === 0) {
        container.innerHTML = `
            <div class="col-12">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> No jobs available at the moment.
                </div>
            </div>
        `;
        return;
    }
    
    container.innerHTML = jobs.map(job => `
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h5 class="card-title mb-0">${job.RoleTitle}</h5>
                        <span class="badge ${job.JobType === 'Full-time' ? 'bg-primary' : 'bg-info'}">
                            ${job.JobType || 'N/A'}
                        </span>
                    </div>
                    
                    <h6 class="text-primary mb-3">
                        <i class="fas fa-building"></i> ${job.CompanyName}
                    </h6>
                    
                    <div class="mb-3">
                        <p class="text-muted small mb-2">
                            ${job.Description ? job.Description.substring(0, 100) + '...' : 'No description available'}
                        </p>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-6">
                            <small class="text-muted">Package</small>
                            <p class="mb-0 fw-bold text-success">
                                ${job.Package_LPA ? '₹' + job.Package_LPA + ' LPA' : 'Not disclosed'}
                            </p>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Min CGPA</small>
                            <p class="mb-0 fw-bold">${job.MinCGPA || 'N/A'}</p>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <small class="text-muted">Deadline</small>
                        <p class="mb-0">${job.Deadline || 'Not specified'}</p>
                    </div>
                    
                    <button class="btn btn-primary w-100" onclick="viewJob(${job.JobID})">
                        <i class="fas fa-eye"></i> View Details
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

async function viewJob(jobId) {
    currentJobId = jobId;
    
    try {
        const response = await apiCall(`/jobs/${jobId}`);
        const job = await response.json();
        
        document.getElementById('jobModalTitle').textContent = job.RoleTitle;
        document.getElementById('jobModalBody').innerHTML = `
            <div class="mb-3">
                <h5 class="text-primary">${job.CompanyName}</h5>
                <p class="text-muted">${job.Industry || ''} | ${job.Location || ''}</p>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <strong>Package:</strong><br>
                    <span class="text-success fs-5">₹${job.Package_LPA || 'Not disclosed'} LPA</span>
                </div>
                <div class="col-md-4">
                    <strong>Min CGPA:</strong><br>
                    <span class="fs-5">${job.MinCGPA}</span>
                </div>
                <div class="col-md-4">
                    <strong>Job Type:</strong><br>
                    <span class="badge bg-primary">${job.JobType || 'N/A'}</span>
                </div>
            </div>
            
            <div class="mb-3">
                <strong>Description:</strong>
                <p>${job.Description || 'No description provided'}</p>
            </div>
            
            <div class="mb-3">
                <strong>Posted:</strong> ${job.PostDate || 'N/A'}<br>
                <strong>Deadline:</strong> ${job.Deadline || 'Not specified'}
            </div>
            
            ${job.DriveName ? `<div class="mb-3"><strong>Placement Drive:</strong> ${job.DriveName}</div>` : ''}
        `;
        
        // Show/hide apply button based on role
        const applyBtn = document.getElementById('applyBtn');
        if (currentUser.role === 'Student') {
            applyBtn.style.display = 'block';
        } else {
            applyBtn.style.display = 'none';
        }
        
        const modal = new bootstrap.Modal(document.getElementById('jobModal'));
        modal.show();
    } catch (error) {
        alert('Error loading job details: ' + error.message);
    }
}

async function applyForJob() {
    if (!currentJobId) return;
    
    try {
        const response = await apiCall('/applications/', {
            method: 'POST',
            body: JSON.stringify({ job_id: currentJobId })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            alert('Application submitted successfully!');
            bootstrap.Modal.getInstance(document.getElementById('jobModal')).hide();
        } else {
            alert('Error: ' + (data.error || 'Failed to apply'));
        }
    } catch (error) {
        alert('Error applying for job: ' + error.message);
    }
}

async function loadCompaniesFilter() {
    try {
        const response = await apiCall('/companies/');
        const companies = await response.json();
        
        const select = document.getElementById('filterCompany');
        select.innerHTML = '<option value="">All Companies</option>' + 
            companies.map(c => `<option value="${c.CompanyID}">${c.CompanyName}</option>`).join('');
    } catch (error) {
        console.error('Error loading companies:', error);
    }
}

// Search and filter
document.getElementById('searchInput')?.addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    const filtered = allJobs.filter(job => 
        job.RoleTitle.toLowerCase().includes(searchTerm) ||
        job.CompanyName.toLowerCase().includes(searchTerm)
    );
    displayJobs(filtered);
});

document.addEventListener('DOMContentLoaded', initPage);
</script>
{% endblock %}
